{% extends 'base.html' %}
{% set page = 'checkin' %}
{% block content %}

<div class="pg-hd">
  <div>
    <div class="pg-title">🍚 식수 신청</div>
    <div class="pg-sub">{{ emp_name }}님{% if emp_id %} ({{ emp_id }}){% endif %}</div>
  </div>
</div>

<div class="px-3 pt-3">
  <div class="c-card mb-3" style="padding:18px">
    <div style="font-size:13px;color:#94A3B8;margin-bottom:16px;line-height:1.6">
      신청할 식사를 선택하세요.<br>
      <span style="color:#64748B">로그인된 본인({{ emp_name }}) 계정으로 신청됩니다.</span>
    </div>

    <button class="meal-btn lunch"  onclick="apply('중식신청', this)">
      <span class="ic">🍚</span>
      <span class="tx"><b>중식 신청</b><small>오늘 점심 구내식당</small></span>
      <span class="ar">›</span>
    </button>

    <button class="meal-btn dinner" onclick="apply('저녁도시락', this)">
      <span class="ic">🍱</span>
      <span class="tx"><b>저녁 식사 신청</b><small>저녁 도시락 / 구내</small></span>
      <span class="ar">›</span>
    </button>
  </div>

  <div style="text-align:center;font-size:12px;color:#475569;margin-top:6px">
    ※ 얼굴인식 등록·체크인은 식당 공용 PC에서 진행합니다.
  </div>
</div>

<div class="toast" id="toast"></div>

<style>
  .meal-btn{
    display:flex; align-items:center; gap:14px; width:100%;
    background:#1E293B; border:1px solid #334155; border-radius:14px;
    padding:16px 16px; margin-bottom:12px; cursor:pointer;
    color:#F1F5F9; text-align:left; transition:transform .08s, background .15s;
  }
  .meal-btn:active{ transform:scale(.98); }
  .meal-btn:disabled{ opacity:.5; }
  .meal-btn.lunch{ border-color:#0EA5E9; }
  .meal-btn.dinner{ border-color:#F59E0B; }
  .meal-btn .ic{ font-size:30px; line-height:1; }
  .meal-btn .tx{ display:flex; flex-direction:column; gap:2px; }
  .meal-btn .tx b{ font-size:16px; }
  .meal-btn .tx small{ font-size:12px; color:#94A3B8; }
  .meal-btn .ar{ margin-left:auto; font-size:22px; color:#64748B; }
  .toast{
    position:fixed; top:70px; left:50%; transform:translateX(-50%);
    background:#1E293B; border:1px solid #334155; border-radius:10px;
    padding:13px 20px; font-size:14px; text-align:center; z-index:999;
    opacity:0; transition:opacity .3s; pointer-events:none; min-width:220px;
    white-space:pre-line; line-height:1.6;
  }
  .toast.show{ opacity:1; }
  .toast.ok{ border-color:#22C55E; color:#22C55E; }
  .toast.err{ border-color:#EF4444; color:#EF4444; }
</style>

<script>
async function apply(action, btn){
  btn.disabled = true;
  try{
    const res = await fetch('/api/meal_checkin', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action })   // emp_id는 서버가 로그인 세션에서 가져감
    });
    const d = await res.json();
    const label = (action === '중식신청') ? '중식' : '저녁 식사';
    if(d.ok){
      toast('✅ ' + (d.name || '') + ' – ' + label + ' 신청 완료!', 'ok');
    }else{
      toast('⚠ ' + (d.error || '오류가 발생했습니다'), 'err');
    }
  }catch(e){
    toast('⚠ 네트워크 오류', 'err');
  }
  setTimeout(()=>{ btn.disabled = false; }, 1500);
}
function toast(msg, type){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type || '');
  clearTimeout(t._t);
  t._t = setTimeout(()=>{ t.className = 'toast'; }, 3200);
}
</script>
{% endblock %}
