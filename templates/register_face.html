{% extends 'base.html' %}
{% set page = 'checkin' %}
{% block content %}

<style>
  .cam-box {
    position: relative; background: #000;
    border-radius: 0 0 12px 12px;
    overflow: hidden; aspect-ratio: 4/3; max-height: 300px;
  }
  .cam-box video {
    position: absolute; top:0; left:0;
    width:100%; height:100%; object-fit:cover;
    transform: scaleX(-1);
  }
  .phase-banner {
    border-radius: 12px 12px 0 0;
    padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
    transition: background .4s;
  }
  .phase-banner.p0{background:#0D4F2E} .phase-banner.p1{background:#1A3A5C}
  .phase-banner.p2{background:#4A2308} .phase-banner.p3{background:#3B0764}
  .phase-banner.p4{background:#0C3040}
  .ph-left  { display:flex; flex-direction:column; gap:4px; }
  .ph-arrow { font-size:26px; color:#fff; }
  .ph-label { font-size:17px; font-weight:800; color:#fff; }
  .ph-guide { font-size:12px; color:rgba(255,255,255,.7); }
  .ph-step  { font-size:22px; font-weight:900; color:rgba(255,255,255,.5); }
  .ph-dots  { display:flex; gap:5px; margin-top:2px; }
  .ph-dot   { width:8px; height:8px; border-radius:50%;
               background:rgba(255,255,255,.2); transition:background .3s; }
  .ph-dot.done { background:rgba(255,255,255,.9); }
  .countdown-overlay {
    position:absolute; top:0; left:0; right:0; bottom:0;
    display:none; align-items:center; justify-content:center;
    background:rgba(0,0,0,.55);
    font-size:80px; font-weight:900; color:#fff; z-index:10;
  }
  .prog-wrap { height:8px; background:#1E293B; overflow:hidden; }
  .prog-bar  { height:100%; width:0%;
               background:linear-gradient(90deg,#22C55E,#06B6D4); transition:width .3s; }
  .form-row  { background:#1E293B; border:1px solid #334155;
               border-radius:10px; padding:12px 14px; margin-bottom:12px; }
  .form-lbl  { font-size:11px; color:#64748B; margin-bottom:6px;
               font-weight:600; text-transform:uppercase; }
  .form-ctrl { background:transparent; border:none; outline:none;
               color:#F1F5F9; font-size:15px; width:100%; font-family:inherit; }
  select.form-ctrl option { background:#1E293B; }
  .btn-start { background:linear-gradient(135deg,#3B82F6,#06B6D4);
               color:#fff; border:none; border-radius:10px;
               padding:14px; font-size:16px; font-weight:700;
               width:100%; cursor:pointer; margin-top:8px; }
  .btn-start:disabled { background:#334155; color:#64748B; cursor:not-allowed; }
  .status-msg { font-size:13px; color:#94A3B8; text-align:center;
                padding:8px 0; min-height:36px; }
  .status-msg.ok  { color:#22C55E; font-weight:700; }
  .status-msg.err { color:#EF4444; }
</style>

<div class="pg-hd">
  <div>
    <div class="pg-title">얼굴 등록</div>
    <div class="pg-sub">5방향 자동 촬영 후 PC에서 동기화</div>
  </div>
  <a href="/checkin" style="font-size:13px;color:#64748B;text-decoration:none;
     border:1px solid #334155;border-radius:6px;padding:5px 12px;">체크인으로</a>
</div>

<div class="px-3 pt-2 pb-5">

  <div class="form-row">
    <div class="form-lbl">사원 선택</div>
    <select class="form-ctrl" id="selEmp">
      <option value="">-- 사원을 선택하세요 --</option>
    </select>
  </div>

  <div class="form-row">
    <div class="form-lbl">관리자 비밀번호</div>
    <input type="password" class="form-ctrl" id="inPw" placeholder="비밀번호 입력" maxlength="20">
  </div>

  <!-- 단계 배너 -->
  <div class="phase-banner p0" id="phaseBanner">
    <div class="ph-left">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="ph-arrow" id="phArrow"></span>
        <span class="ph-label" id="phLabel">사원 선택 후 시작</span>
      </div>
      <span class="ph-guide" id="phGuide"></span>
      <div class="ph-dots">
        <span class="ph-dot" id="pd0"></span><span class="ph-dot" id="pd1"></span>
        <span class="ph-dot" id="pd2"></span><span class="ph-dot" id="pd3"></span>
        <span class="ph-dot" id="pd4"></span>
      </div>
    </div>
    <span class="ph-step" id="phStep">0 / 5</span>
  </div>

  <div class="cam-box" id="camBox">
    <video id="vid" autoplay muted playsinline></video>
    <div class="countdown-overlay" id="countdown"></div>
  </div>

  <div class="prog-wrap">
    <div class="prog-bar" id="progBar"></div>
  </div>

  <div class="status-msg" id="statusMsg">사원을 선택하고 시작 버튼을 누르세요</div>

  <button class="btn-start" id="btnStart" onclick="startCapture()">
    📸 5방향 자동 촬영 시작
  </button>

</div>

<script>
const PHASES = [
  {cls:'p0', label:'정면을 보세요',   arrow:'',  guide:'카메라를 정면으로 바라봐 주세요'},
  {cls:'p1', label:'오른쪽을 보세요', arrow:'▶', guide:'살짝만 오른쪽으로 고개를 틀어주세요'},
  {cls:'p2', label:'왼쪽을 보세요',   arrow:'◀', guide:'살짝만 왼쪽으로 고개를 틀어주세요'},
  {cls:'p3', label:'위를 보세요',     arrow:'▲', guide:'살짝만 위로 고개를 들어주세요'},
  {cls:'p4', label:'아래를 보세요',   arrow:'▼', guide:'살짝만 아래로 고개를 숙여주세요'},
];
let stream = null;

function setStatus(msg, cls) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg; el.className = 'status-msg ' + (cls||'');
}

function setPhase(idx, done) {
  const p = PHASES[Math.min(idx, PHASES.length-1)];
  document.getElementById('phaseBanner').className = 'phase-banner ' + p.cls;
  document.getElementById('phArrow').textContent = done ? '✅' : p.arrow;
  document.getElementById('phLabel').textContent = done ? '등록 완료!' : p.label;
  document.getElementById('phGuide').textContent = done ? '' : p.guide;
  document.getElementById('phStep').textContent  = `${Math.min(idx+1, PHASES.length)} / ${PHASES.length}`;
  document.getElementById('progBar').style.width = ((Math.min(idx+1,PHASES.length)/PHASES.length)*100)+'%';
  for (let i=0; i<5; i++) {
    document.getElementById('pd'+i).className = 'ph-dot' + (i<=idx?' done':'');
  }
}

async function countdown(sec) {
  const el = document.getElementById('countdown');
  el.style.display = 'flex';
  for (let i=sec; i>=1; i--) {
    el.textContent = i;
    await new Promise(r => setTimeout(r, 1000));
  }
  el.style.display = 'none';
}

function captureFrame() {
  const vid = document.getElementById('vid');
  const c = document.createElement('canvas');
  c.width = vid.videoWidth; c.height = vid.videoHeight;
  const ctx = c.getContext('2d');
  ctx.translate(c.width, 0); ctx.scale(-1, 1);
  ctx.drawImage(vid, 0, 0);
  return c.toDataURL('image/jpeg', 0.85);
}

async function startCapture() {
  const emp_id = document.getElementById('selEmp').value.trim().toUpperCase();
  const pw     = document.getElementById('inPw').value;
  if (!emp_id) { setStatus('사원을 선택해 주세요.', 'err'); return; }
  if (!pw)     { setStatus('관리자 비밀번호를 입력해 주세요.', 'err'); return; }

  document.getElementById('btnStart').disabled = true;

  for (let i=0; i<PHASES.length; i++) {
    setPhase(i);
    setStatus(`${PHASES[i].label} — 3초 후 자동 촬영됩니다`);
    await countdown(3);
    setStatus('촬영 중…');

    const img = captureFrame();
    try {
      const res = await fetch('/api/register_face_frame', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({emp_id, phase:i, image:img, pw})
      }).then(r=>r.json());

      if (!res.ok) {
        setStatus('오류: ' + (res.msg||'알 수 없는 오류'), 'err');
        document.getElementById('btnStart').disabled = false;
        return;
      }
    } catch(e) {
      setStatus('네트워크 오류', 'err');
      document.getElementById('btnStart').disabled = false;
      return;
    }
    setStatus(`✅ ${i+1}/${PHASES.length} 완료`, 'ok');
    await new Promise(r => setTimeout(r, 400));
  }

  setPhase(PHASES.length-1, true);
  const name = document.getElementById('selEmp').options[document.getElementById('selEmp').selectedIndex]?.dataset?.name || emp_id;
  setStatus(`🎉 ${name} 촬영 완료! PC에서 새로고침하면 적용됩니다.`, 'ok');
}

async function loadEmpList() {
  try {
    const emps = await fetch('/api/employees').then(r=>r.json());
    const sel  = document.getElementById('selEmp');
    emps.forEach(e => {
      const opt = document.createElement('option');
      opt.value = e.emp_id; opt.dataset.name = e.name;
      opt.text  = `[${e.emp_id}] ${e.name}`;
      sel.appendChild(opt);
    });
  } catch(e) {
    document.getElementById('selEmp').outerHTML =
      '<input class="form-ctrl" id="selEmp" placeholder="사원번호 직접 입력 (예: M001)">';
  }
}

(async () => {
  await loadEmpList();
  stream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:'user', width:{ideal:640}}, audio:false
  });
  document.getElementById('vid').srcObject = stream;
})();
</script>

{% endblock %}
